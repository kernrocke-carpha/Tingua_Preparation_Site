name: Deploy redirect to GitHub Pages

on:
  push:
    branches: [main] # change to "master" if that's your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Assemble a one-page site: index.html is the redirect, and 404.html is a
      # copy so any deep link under the Pages URL also forwards to Cloudflare.
      - name: Prepare redirect site
        run: |
          mkdir -p _site
          cp gh-pages-redirect/index.html _site/index.html
          cp gh-pages-redirect/index.html _site/404.html
          echo "--- _site ---"
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
